<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <script src="/_sdk/data_sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        * {
            font-family: 'Poppins', sans-serif;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .app-wrapper {
            height: 100%;
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .form-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a202c;
        }

        .form-subtitle {
            font-size: 14px;
            color: #718096;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) {
            animation-delay: 0.1s;
        }

        .form-group:nth-child(2) {
            animation-delay: 0.2s;
        }

        .form-group:nth-child(3) {
            animation-delay: 0.3s;
        }

        .form-group:nth-child(4) {
            animation-delay: 0.4s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2d3748;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            box-sizing: border-box;
            color: #1a202c;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .success-message {
            background: #f0fdf4;
            border: 2px solid #22c55e;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            color: #15803d;
            font-size: 14px;
            font-weight: 500;
            animation: slideDown 0.4s ease-out;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-message {
            background: #fef2f2;
            border: 2px solid #ef4444;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            color: #991b1b;
            font-size: 13px;
            font-weight: 500;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
    <style>
        body {
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div class="app-wrapper h-full w-full">
        <div class="form-container">
            <div class="success-message" id="successMessage"></div>
            <div class="error-message" id="errorMessage"></div>
            <h1 class="form-title" id="formTitle">Get In Touch</h1>
            <p class="form-subtitle" id="formSubtitle">We'd love to hear from you. Send us a message!</p>
            <form id="contactForm">
                <div class="form-group"><label for="name">Your Name</label> <input type="text" id="name" name="name"
                        placeholder="Azhar Khan" required>
                </div>
                <div class="form-group"><label for="email">Your Email</label> <input type="email" id="email"
                        name="email" placeholder="azhar.khan@gmail.com" required>
                </div>
                <div class="form-group"><label for="message">Your Message</label> <textarea id="message" name="message"
                        placeholder="Tell us what's on your mind..." required></textarea>
                </div><button type="submit" class="submit-btn" id="submitBtn">Send Message</button>
            </form>
        </div>
    </div>
    <script>
        const defaultConfig = {
            form_title: "Get In Touch",
            form_subtitle: "We'd love to hear from you. Send us a message!",
            submit_button_text: "Send Message",
            success_message: "Thank you! Your message has been sent successfully.",
            primary_color: "#667eea",
            secondary_color: "#764ba2"
        };

        let config = { ...defaultConfig };
        let isSubmitting = false;

        const dataHandler = {
            onDataChanged(data) {
                // Data is stored, form continues to work
            }
        };

        async function initializeApp() {
            // Initialize Data SDK
            const dataResult = await window.dataSdk.init(dataHandler);
            if (!dataResult.isOk) {
                console.error("Failed to initialize data SDK");
            }

            // Initialize Element SDK
            window.elementSdk.init({
                defaultConfig,
                onConfigChange,
                mapToCapabilities: (config) => ({
                    recolorables: [
                        {
                            get: () => config.primary_color || defaultConfig.primary_color,
                            set: (value) => {
                                config.primary_color = value;
                                window.elementSdk.setConfig({ primary_color: value });
                            }
                        },
                        {
                            get: () => config.secondary_color || defaultConfig.secondary_color,
                            set: (value) => {
                                config.secondary_color = value;
                                window.elementSdk.setConfig({ secondary_color: value });
                            }
                        }
                    ],
                    borderables: [],
                    fontEditable: undefined,
                    fontSizeable: undefined
                }),
                mapToEditPanelValues: (config) => new Map([
                    ["form_title", config.form_title || defaultConfig.form_title],
                    ["form_subtitle", config.form_subtitle || defaultConfig.form_subtitle],
                    ["submit_button_text", config.submit_button_text || defaultConfig.submit_button_text],
                    ["success_message", config.success_message || defaultConfig.success_message]
                ])
            });
        }

        async function onConfigChange(newConfig) {
            config = newConfig;

            document.getElementById("formTitle").textContent = config.form_title || defaultConfig.form_title;
            document.getElementById("formSubtitle").textContent = config.form_subtitle || defaultConfig.form_subtitle;
            document.getElementById("submitBtn").textContent = config.submit_button_text || defaultConfig.submit_button_text;

            // Update gradient colors
            const primary = config.primary_color || defaultConfig.primary_color;
            const secondary = config.secondary_color || defaultConfig.secondary_color;

            document.querySelector(".app-wrapper").style.background = `linear-gradient(135deg, ${primary} 0%, ${secondary} 100%)`;
            document.querySelector(".submit-btn").style.background = `linear-gradient(135deg, ${primary} 0%, ${secondary} 100%)`;

            // Update input focus color via inline style
            const style = document.querySelector("style");
            const newStyle = style.textContent.replace(
                /border-color: #667eea;/g,
                `border-color: ${primary};`
            ).replace(
                /box-shadow: 0 0 0 3px rgba\(102, 126, 234, 0\.1\);/g,
                `box-shadow: 0 0 0 3px ${primary}20;`
            ).replace(
                /box-shadow: 0 10px 20px rgba\(102, 126, 234, 0\.3\);/g,
                `box-shadow: 0 10px 20px ${primary}4d;`
            );
            style.textContent = newStyle;
        }

        document.getElementById("contactForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            if (isSubmitting) return;

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const message = document.getElementById("message").value.trim();

            const errorMessage = document.getElementById("errorMessage");
            const successMessage = document.getElementById("successMessage");

            // Clear previous messages
            errorMessage.classList.remove("show");
            successMessage.classList.remove("show");

            // Validate
            if (!name || !email || !message) {
                errorMessage.textContent = "Please fill in all fields.";
                errorMessage.classList.add("show");
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorMessage.textContent = "Please enter a valid email address.";
                errorMessage.classList.add("show");
                return;
            }

            // Show loading state
            isSubmitting = true;
            const submitBtn = document.getElementById("submitBtn");
            submitBtn.disabled = true;
            const originalText = submitBtn.textContent;
            submitBtn.textContent = "Sending...";

            try {
                // Save to data sheet
                const result = await window.dataSdk.create({
                    name,
                    email,
                    message,
                    submittedAt: new Date().toISOString()
                });

                if (result.isOk) {
                    // Show success
                    successMessage.textContent = config.success_message || defaultConfig.success_message;
                    successMessage.classList.add("show");

                    // Reset form
                    document.getElementById("contactForm").reset();

                    // Hide success message after 5 seconds
                    setTimeout(() => {
                        successMessage.classList.remove("show");
                    }, 5000);
                } else {
                    errorMessage.textContent = "Failed to send message. Please try again.";
                    errorMessage.classList.add("show");
                }
            } catch (error) {
                console.error("Error submitting form:", error);
                errorMessage.textContent = "An error occurred. Please try again.";
                errorMessage.classList.add("show");
            } finally {
                isSubmitting = false;
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Initialize on load
        window.addEventListener("DOMContentLoaded", initializeApp);
    </script>

</body>

</html>
